<style>
/* ============================================================================
   MECHANIC INCENTIVE SYSTEM - MODERN UI STYLESHEET
   Production-grade CSS with modern design patterns
   ============================================================================ */

/* CSS Variables (Design Tokens) */
:root {
  /* Colors - Primary Palette */
  --color-primary: #f59e0b;
  --color-primary-dark: #b45309 ;
  --color-primary-light: #60a5fa;
  
  --color-success: #10b981;
  --color-success-dark: #059669;
  --color-success-light: #34d399;
  
  --color-warning: #f59e0b;
  --color-warning-dark: #d97706;
  --color-warning-light: #fbbf24;
  
  --color-danger: #ef4444;
  --color-danger-dark: #dc2626;
  --color-danger-light: #f87171;
  
  --color-info: #f59e0b;
  --color-info-dark: #b45309 ;
  --color-info-light: #60a5fa;
  
  /* Neutrals */
  --color-gray-50: #f9fafb;
  --color-gray-100: #f3f4f6;
  --color-gray-200: #e5e7eb;
  --color-gray-300: #d1d5db;
  --color-gray-400: #9ca3af;
  --color-gray-500: #6b7280;
  --color-gray-600: #4b5563;
  --color-gray-700: #374151;
  --color-gray-800: #1f2937;
  --color-gray-900: #111827;
  
  /* Semantic Colors */
  --color-background: #ffffff;
  --color-surface: #f9fafb;
  --color-border: #e5e7eb;
  --color-text: #111827;
  --color-text-secondary: #6b7280;
  
  /* Spacing */
  --spacing-xs: 0.25rem;
  --spacing-sm: 0.5rem;
  --spacing-md: 1rem;
  --spacing-lg: 1.5rem;
  --spacing-xl: 2rem;
  --spacing-2xl: 3rem;
  
  /* Border Radius */
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
  
  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
  
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;
  
  /* Z-index */
  --z-dropdown: 1000;
  --z-sticky: 1020;
  --z-modal-backdrop: 1040;
  --z-modal: 1050;
  --z-notification: 1060;
}

/* ============================================================================
   BASE STYLES
   ============================================================================ */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  color: var(--color-text);
  background-color: var(--color-surface);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ============================================================================
   TYPOGRAPHY
   ============================================================================ */

h1, h2, h3, h4, h5, h6 {
  font-weight: 600;
  line-height: 1.2;
  color: var(--color-text);
}

h1 { font-size: 2rem; margin-bottom: var(--spacing-md); }
h2 { font-size: 1.5rem; margin-bottom: var(--spacing-md); }
h3 { font-size: 1.25rem; margin-bottom: var(--spacing-sm); }
h4 { font-size: 1.125rem; margin-bottom: var(--spacing-sm); }

p {
  margin-bottom: var(--spacing-md);
  color: var(--color-text-secondary);
}

small {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

strong {
  font-weight: 600;
  color: var(--color-text);
}

/* ============================================================================
   NAVIGATION
   ============================================================================ */

.navbar {
  background: var(--color-background);
  border-bottom: 1px solid var(--color-border);
  padding: var(--spacing-md) var(--spacing-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  box-shadow: var(--shadow-sm);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  font-weight: 600;
  font-size: 1.125rem;
  color: var(--color-text);
}

.brand-icon {
  font-size: 1.5rem;
}

.nav-menu {
  display: flex;
  gap: var(--spacing-sm);
}

.nav-link {
  padding: var(--spacing-sm) var(--spacing-md);
  color: var(--color-text-secondary);
  text-decoration: none;
  border-radius: var(--radius-md);
  font-weight: 500;
  transition: all var(--transition-fast);
}

.nav-link:hover {
  color: var(--color-primary);
  background: var(--color-gray-50);
}

.nav-link.active {
  color: var(--color-primary);
  background: var(--color-primary);
  background: rgba(59, 130, 246, 0.1);
}

.nav-user {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
}

.user-email {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

/* ============================================================================
   LAYOUT
   ============================================================================ */

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--spacing-xl);
}

.page-header {
  margin-bottom: var(--spacing-xl);
}

.page-title {
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--spacing-xs);
}

.page-subtitle {
  font-size: 1rem;
  color: var(--color-text-secondary);
  margin: 0;
}

.content-grid {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: var(--spacing-xl);
  margin-top: var(--spacing-xl);
}

.col-main {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xl);
}

.col-sidebar {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xl);
}

/* ============================================================================
   CARDS
   ============================================================================ */

.card {
  background: var(--color-background);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow var(--transition-base);
}

.card:hover {
  box-shadow: var(--shadow-md);
}

.card-header {
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 1.125rem;
  font-weight: 600;
  margin: 0;
}

.card-body {
  padding: var(--spacing-lg);
}

/* ============================================================================
   STAT CARDS
   ============================================================================ */

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: var(--spacing-lg);
  margin-bottom: var(--spacing-xl);
}

.stat-card {
  background: var(--color-background);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--spacing-lg);
  display: flex;
  align-items: flex-start;
  gap: var(--spacing-md);
  transition: all var(--transition-base);
}

.stat-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.stat-icon {
  font-size: 2rem;
  line-height: 1;
}

.stat-content {
  flex: 1;
}

.stat-label {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
  margin-bottom: var(--spacing-xs);
}

.stat-value {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1;
  margin-bottom: var(--spacing-xs);
}

.stat-subtitle {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

/* Stat Card Variants */
.stat-primary { border-left: 4px solid var(--color-primary); }
.stat-success { border-left: 4px solid var(--color-success); }
.stat-warning { border-left: 4px solid var(--color-warning); }
.stat-danger { border-left: 4px solid var(--color-danger); }
.stat-info { border-left: 4px solid var(--color-info); }

/* ============================================================================
   TABLES
   ============================================================================ */

.table-responsive {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}

.table thead {
  background: var(--color-gray-50);
}

.table th {
  padding: var(--spacing-sm) var(--spacing-md);
  text-align: left;
  font-weight: 600;
  color: var(--color-text-secondary);
  border-bottom: 1px solid var(--color-border);
}

.table td {
  padding: var(--spacing-md);
  border-bottom: 1px solid var(--color-border);
}

.table tbody tr {
  transition: background var(--transition-fast);
}

.table tbody tr:hover {
  background: var(--color-gray-50);
}

/* ============================================================================
   BADGES
   ============================================================================ */

.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.25rem 0.75rem;
  border-radius: var(--radius-full);
  font-size: 0.75rem;
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
}

.badge-primary {
  background: rgba(59, 130, 246, 0.1);
  color: var(--color-primary-dark);
}

.badge-success {
  background: rgba(16, 185, 129, 0.1);
  color: var(--color-success-dark);
}

.badge-warning {
  background: rgba(245, 158, 11, 0.1);
  color: var(--color-warning-dark);
}

.badge-danger {
  background: rgba(239, 68, 68, 0.1);
  color: var(--color-danger-dark);
}

.badge-info {
  background: rgba(59, 130, 246, 0.1);
  color: var(--color-info-dark);
}

.badge-gray {
  background: var(--color-gray-100);
  color: var(--color-gray-700);
}

.badge-blue { background: rgba(59, 130, 246, 0.1); color: var(--color-primary-dark); }
.badge-green { background: rgba(16, 185, 129, 0.1); color: var(--color-success-dark); }
.badge-yellow { background: rgba(245, 158, 11, 0.1); color: var(--color-warning-dark); }
.badge-red { background: rgba(239, 68, 68, 0.1); color: var(--color-danger-dark); }
.badge-orange { background: rgba(249, 115, 22, 0.1); color: #c2410c; }
.badge-purple { background: rgba(168, 85, 247, 0.1); color: #7c3aed; }

/* ============================================================================
   BUTTONS
   ============================================================================ */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-sm);
  padding: 0.625rem 1.25rem;
  border: none;
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition-fast);
  text-decoration: none;
  white-space: nowrap;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--color-primary);
  color: white;
}

.btn-primary:hover:not(:disabled) {
  background: var(--color-primary-dark);
  box-shadow: var(--shadow-md);
}

.btn-success {
  background: var(--color-success);
  color: white;
}

.btn-success:hover:not(:disabled) {
  background: var(--color-success-dark);
}

.btn-danger {
  background: var(--color-danger);
  color: white;
}

.btn-danger:hover:not(:disabled) {
  background: var(--color-danger-dark);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--color-border);
  color: var(--color-text);
}

.btn-outline:hover:not(:disabled) {
  background: var(--color-gray-50);
  border-color: var(--color-gray-300);
}

.btn-sm {
  padding: 0.375rem 0.75rem;
  font-size: 0.8125rem;
}

.btn-icon {
  padding: 0.5rem;
  width: 2rem;
  height: 2rem;
  font-size: 1.25rem;
  line-height: 1;
}

/* ============================================================================
   FORMS
   ============================================================================ */

.form-container {
  max-width: 800px;
  margin: 0 auto;
}

.wo-form {
  background: var(--color-background);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--spacing-xl);
}

.form-section {
  margin-bottom: var(--spacing-2xl);
}

.section-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: var(--spacing-sm);
}

.section-description {
  color: var(--color-text-secondary);
  margin-bottom: var(--spacing-lg);
}

.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: var(--spacing-lg);
  margin-bottom: var(--spacing-lg);
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.form-label {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text);
}

.required {
  color: var(--color-danger);
}

.form-control {
  padding: 0.625rem 0.875rem;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-family: inherit;
  background: var(--color-background);
  color: var(--color-text);
  transition: all var(--transition-fast);
}

.form-control:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.form-control:disabled {
  background: var(--color-gray-50);
  cursor: not-allowed;
}

.form-help {
  font-size: 0.75rem;
  color: var(--color-text-secondary);
}

select.form-control {
  cursor: pointer;
}

textarea.form-control {
  resize: vertical;
  min-height: 100px;
}

.form-actions {
  display: flex;
  gap: var(--spacing-md);
  justify-content: flex-end;
  margin-top: var(--spacing-xl);
  padding-top: var(--spacing-xl);
  border-top: 1px solid var(--color-border);
}

/* ============================================================================
   COMPONENT PREVIEW
   ============================================================================ */

.component-preview {
  margin-top: var(--spacing-lg);
}

.preview-card {
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  padding: var(--spacing-lg);
}

.preview-title {
  font-size: 0.875rem;
  font-weight: 600;
  margin-bottom: var(--spacing-md);
  color: var(--color-text-secondary);
}

.preview-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--spacing-md);
}

.preview-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.preview-label {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

.preview-value {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text);
}

.preview-highlight {
  color: var(--color-primary);
  font-size: 1rem;
}

/* ============================================================================
   TEAM BUILDER
   ============================================================================ */

.team-builder {
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  padding: var(--spacing-lg);
}

.team-members {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
  margin-bottom: var(--spacing-md);
}

.team-member-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: var(--spacing-md);
  align-items: center;
}

.team-member-percentage {
  position: relative;
  width: 120px;
}

.percentage-input {
  padding-right: 2rem;
}

.percentage-symbol {
  position: absolute;
  right: 0.875rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-secondary);
  pointer-events: none;
}

.team-summary {
  margin-top: var(--spacing-lg);
  padding-top: var(--spacing-lg);
  border-top: 1px solid var(--color-border);
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  margin-bottom: var(--spacing-sm);
}

.total-value {
  font-size: 1.25rem;
  color: var(--color-primary);
}

.validation-message {
  text-align: center;
  font-size: 0.875rem;
}

.validation-success { color: var(--color-success); }
.validation-error { color: var(--color-danger); }
.validation-warning { color: var(--color-warning); }

/* ============================================================================
   LEADERBOARD
   ============================================================================ */

.leaderboard-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

.leaderboard-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  padding: var(--spacing-md);
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
}

.leaderboard-item:hover {
  background: var(--color-gray-100);
  transform: translateX(4px);
}

.leaderboard-item .rank {
  font-size: 1.5rem;
  font-weight: 700;
  width: 2.5rem;
  text-align: center;
}

.mechanic-info {
  flex: 1;
}

.mechanic-name {
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 0.125rem;
}

.mechanic-points {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

.mechanic-earnings {
  font-weight: 600;
  color: var(--color-primary);
}

/* ============================================================================
   ACTIVITY FEED
   ============================================================================ */

.activity-feed {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

.activity-item {
  display: flex;
  gap: var(--spacing-md);
  padding: var(--spacing-md);
  border-radius: var(--radius-md);
  transition: background var(--transition-fast);
}

.activity-item:hover {
  background: var(--color-gray-50);
}

.activity-icon {
  font-size: 1.25rem;
  line-height: 1;
}

.activity-content {
  flex: 1;
  min-width: 0;
}

.activity-description {
  font-size: 0.875rem;
  color: var(--color-text);
  margin-bottom: 0.25rem;
}

.activity-meta {
  font-size: 0.75rem;
  color: var(--color-text-secondary);
  display: flex;
  gap: var(--spacing-sm);
  align-items: center;
}

/* ============================================================================
   APPROVALS
   ============================================================================ */

.filters-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--spacing-lg);
  background: var(--color-background);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  margin-bottom: var(--spacing-xl);
}

.filter-group {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
}

.filter-label {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text);
}

.filter-select {
  min-width: 200px;
}

.filter-stats {
  display: flex;
  gap: var(--spacing-md);
}

.stat-badge {
  padding: 0.375rem 0.875rem;
  background: var(--color-primary);
  color: white;
  border-radius: var(--radius-full);
  font-size: 0.875rem;
  font-weight: 600;
}

.approvals-grid {
  display: grid;
  gap: var(--spacing-lg);
}

.approval-card {
  background: var(--color-background);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--spacing-lg);
  transition: all var(--transition-base);
}

.approval-card:hover {
  box-shadow: var(--shadow-lg);
  border-color: var(--color-primary);
}

.approval-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--spacing-md);
  padding-bottom: var(--spacing-md);
  border-bottom: 1px solid var(--color-border);
}

.approval-title {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
}

.approval-title h3 {
  margin: 0;
  font-size: 1.125rem;
}

.approval-date {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

.approval-details {
  margin-bottom: var(--spacing-md);
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--spacing-sm) 0;
  border-bottom: 1px solid var(--color-gray-100);
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
}

.detail-value {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text);
}

.detail-highlight {
  color: var(--color-primary);
  text-transform: capitalize;
}

.approval-actions {
  display: flex;
  gap: var(--spacing-sm);
  justify-content: flex-end;
  padding-top: var(--spacing-md);
  border-top: 1px solid var(--color-border);
}

/* ============================================================================
   MODALS
   ============================================================================ */

.modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: none;
  z-index: var(--z-modal);
}

.modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  animation: fadeIn var(--transition-base);
}

.modal-content {
  position: relative;
  background: var(--color-background);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  max-width: 500px;
  width: 90%;
  max-height: 90vh;
  overflow: hidden;
  animation: slideUp var(--transition-slow);
}

.modal-large {
  max-width: 800px;
}

.modal-header {
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--color-border);
  display: flex;
